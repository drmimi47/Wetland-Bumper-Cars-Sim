<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wetland Bumper Cars Sim</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #BBBBBB; overflow: hidden; }
    canvas { display: block; }
    #gif-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 10;
      align-items: center;
      justify-content: center;
    }
    #gif-overlay.active { display: flex; }
    #gif-overlay img {
      height: 100%;
      width: auto;
    }
  </style>
</head>
<body>
  <canvas id="sim"></canvas>
  <div id="gif-overlay">
    <img src="flower.gif" alt="flower" />
  </div>
  <script src="script.js"></script>
</body>
</html>
